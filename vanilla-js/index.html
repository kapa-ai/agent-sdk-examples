<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kapa Agent — Vanilla JS Example</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      *, *::before, *::after { scrollbar-color: #373a40 transparent; scrollbar-width: thin; }

      body {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: #141517;
        color: #c1c2c5;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #header {
        padding: 12px 20px;
        border-bottom: 1px solid #373a40;
        background: #1a1b1e;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      #header strong { flex: 1; }

      #header button {
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid #373a40;
        background: transparent;
        color: #c1c2c5;
        cursor: pointer;
        font-size: 13px;
      }

      #header button:hover { background: #25262b; }
      #header button:disabled { opacity: 0.4; cursor: default; }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg-user {
        align-self: flex-end;
        background: #25262b;
        padding: 8px 14px;
        border-radius: 12px;
        max-width: 80%;
        font-size: 14px;
        font-weight: 500;
        white-space: pre-wrap;
      }

      .msg-assistant {
        align-self: flex-start;
        max-width: 90%;
        font-size: 14px;
        line-height: 1.55;
      }

      .msg-error {
        align-self: flex-start;
        background: rgba(250, 82, 82, 0.1);
        border: 1px solid #e03131;
        color: #ff6b6b;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
      }

      .tool-card {
        background: #1a1b1e;
        border: 1px solid #373a40;
        border-radius: 8px;
        margin: 6px 0;
        overflow: hidden;
        width: 360px;
      }

      .tool-header {
        padding: 6px 10px;
        background: #25262b;
        font-size: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tool-status {
        font-size: 11px;
        color: #868e96;
      }

      .tool-body {
        padding: 8px 10px;
        font-size: 12px;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 150px;
        overflow: auto;
        color: #909296;
      }

      .approval-buttons {
        padding: 8px 10px;
        display: flex;
        gap: 8px;
      }

      .approval-buttons button {
        padding: 4px 12px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
      }

      .btn-allow { background: #228be6; color: white; }
      .btn-deny { background: transparent; color: #868e96; border: 1px solid #373a40 !important; }

      #streaming-indicator {
        padding: 4px 20px;
        font-size: 12px;
        color: #868e96;
        display: none;
      }

      #input-area {
        padding: 12px 20px;
        border-top: 1px solid #373a40;
        display: flex;
        gap: 8px;
        flex-shrink: 0;
        background: #1a1b1e;
      }

      #input-area input {
        flex: 1;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #373a40;
        background: #25262b;
        color: #c1c2c5;
        font-size: 14px;
        outline: none;
      }

      #input-area input::placeholder { color: #5c5f66; }
      #input-area input:focus { border-color: #228be6; }

      #send-btn, #stop-btn {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      #send-btn { background: #228be6; color: white; }
      #send-btn:disabled { opacity: 0.4; cursor: default; }
      #stop-btn { background: #e03131; color: white; display: none; }

      #footer {
        padding: 8px 20px;
        text-align: center;
        font-size: 11px;
        color: #5c5f66;
        border-top: 1px solid #25262b;
      }

      .markdown p { margin: 0 0 8px; }
      .markdown p:last-child { margin-bottom: 0; }
      .markdown strong { color: #74c0fc; }
      .markdown a { color: #74c0fc; text-decoration: none; }
      .markdown a:hover { text-decoration: underline; }
      .markdown code {
        background: #25262b;
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 12px;
      }
      .markdown pre {
        background: #1a1b1e;
        padding: 10px;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 12px;
        margin: 8px 0;
      }
      .markdown pre code { background: none; padding: 0; }
      .markdown ul, .markdown ol { padding-left: 20px; margin-bottom: 8px; }
      .markdown li + li { margin-top: 3px; }
      .markdown h2, .markdown h3 { margin: 12px 0 6px; font-weight: 600; }
      .markdown table { width: 100%; border-collapse: collapse; margin: 8px 0; }
      .markdown th { text-align: left; padding: 6px 10px; border-bottom: 1px solid #373a40; font-weight: 600; background: #25262b; }
      .markdown td { padding: 6px 10px; border-bottom: 1px solid #2a2a2e; }
    </style>
  </head>
  <body>
    <div id="header">
      <strong>Kapa Agent SDK — Vanilla JS</strong>
      <button id="new-chat-btn">New Chat</button>
    </div>
    <div id="messages"></div>
    <div id="streaming-indicator">Agent is thinking...</div>
    <div id="input-area">
      <input id="input" type="text" placeholder="Ask about your projects, usage, or team..." />
      <button id="send-btn">Send</button>
      <button id="stop-btn">Stop</button>
    </div>
    <div id="footer">Built with Kapa Agent Framework</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
